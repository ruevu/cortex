<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cortex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/viewer/style.css">
</head>
<body>

<canvas id="stage"></canvas>

<div class="logo-mark">
  <div class="word">cortex</div>
</div>

<div class="presence" id="presence">
  <div class="avatar user" data-handle="rasmus" data-provider="human">
    <div class="dot"></div>
  </div>
  <div class="avatar kai" data-handle="kai" data-provider="claude">
    <svg viewBox="-8 -8 16 16" xmlns="http://www.w3.org/2000/svg">
      <line class="glyph-line" x1="-5" y1="0"  x2="5" y2="0"/>
      <line class="glyph-line" x1="0"  y1="-5" x2="0" y2="5"/>
      <line class="glyph-line" x1="-3.5" y1="-3.5" x2="3.5" y2="3.5"/>
      <line class="glyph-line" x1="-3.5" y1="3.5"  x2="3.5" y2="-3.5"/>
    </svg>
  </div>
  <div class="avatar mira" data-handle="mira" data-provider="codex">
    <svg viewBox="-8 -8 16 16" xmlns="http://www.w3.org/2000/svg">
      <polygon class="glyph-line" points="0,-5.5 4.76,-2.75 4.76,2.75 0,5.5 -4.76,2.75 -4.76,-2.75"/>
    </svg>
  </div>
  <div class="presence-tip" id="presence-tip">
    <span class="handle" id="presence-tip-handle">@rasmus</span>
    <span class="provider" id="presence-tip-provider">human</span>
  </div>
</div>

<div class="card-scrim" id="card-scrim"></div>
<div class="decision-card" id="decision-card"></div>

<div class="controls">
  <div class="ctrl-label">step agent</div>
  <div class="agent-buttons">
    <button class="agent-btn a" data-agent="a">@rasmus</button>
    <button class="agent-btn b" data-agent="b">@kai</button>
    <button class="agent-btn c" data-agent="c">@mira</button>
  </div>
  <div class="auto-toggle">
    <div class="switch on" id="auto-switch"></div>
    <label for="auto-switch">auto traverse</label>
  </div>
  <div class="ctrl-label" style="margin-top: 8px;">simulate</div>
  <button class="merge-btn" id="merge-btn">merge #512</button>
  <div class="auto-toggle">
    <div class="switch" id="theme-switch"></div>
    <label for="theme-switch">light mode</label>
  </div>
</div>

<script type="module" src="/viewer/viewer.js"></script>

</body>
</html>
